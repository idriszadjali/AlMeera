<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Offer Letter Builder</title>
<style>
 *{box-sizing:border-box}
 body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;background:#eef1f5;display:grid;place-items:center;min-height:100vh;padding:20px}
 .lock{background:#fff;border:1px solid #dde3ea;border-radius:16px;box-shadow:0 12px 34px rgba(16,24,40,.14);padding:28px;width:min(360px,100%);text-align:center}
 .lock h1{font-size:17px;color:#331d4d;margin:0 0 4px}
 .lock p{font-size:13px;color:#647082;margin:0 0 16px}
 .lock input{width:100%;font-size:16px;padding:11px 12px;border:1px solid #c5cdd6;border-radius:8px}
 .lock input:focus{outline:none;border-color:#462967;box-shadow:0 0 0 3px rgba(70,41,103,.15)}
 .lock button{width:100%;margin-top:10px;font-size:14px;font-weight:600;padding:11px;border:none;border-radius:9px;background:#462967;color:#fff;cursor:pointer}
 .lock button:hover{background:#331d4d}
 .lock .err{color:#b3261e;font-size:12.5px;min-height:16px;margin-top:10px}
</style></head><body>
<form class="lock" id="f" onsubmit="return unlock(event)">

 <input type="password" id="pw" placeholder="Passphrase" autofocus autocomplete="current-password">
 <button type="submit">Unlock</button>

</form>
